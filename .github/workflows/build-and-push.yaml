name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Update manifest with new image tag
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.sha }}
          sed -i "s|image: ghcr.io/stefanbuzu/k8s-prac:.*|image: $IMAGE|" k8s/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "deploy: update image to ${{ github.sha }}"
          git push
