apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: demo-api
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 3000
